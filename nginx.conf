server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Health check used by Docker HEALTHCHECK
  location = /healthz { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }

  # Long cache for hashed assets
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # No cache for service worker / manifest / offline page (PWA correctness)
  location ~* ^/(service-worker\.js|sw\.js|manifest\.webmanifest|manifest\.json|offline\.html)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Security headers (modest defaults; CSP intentionally omitted because the
  # app loads weather/i18n resources we haven't audited yet).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
}
