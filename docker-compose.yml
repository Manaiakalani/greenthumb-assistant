services:
  greenthumb-assistant:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
      provenance: false
      sbom: false
    image: greenthumb-assistant:local
    container_name: greenthumb-assistant
    restart: unless-stopped
    ports:
      - "3014:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
